<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZH Downloader</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">
  <header>
    <img src="icons/icon48.png" alt="ZH" class="logo">
    <div class="header-text">
      <span class="title">ZH Downloader</span>
      <span class="sub">by ZH Motions</span>
    </div>
    <div class="header-right">
      <div class="toggle-wrap" title="Intercept all downloads">
        <span class="toggle-label">Intercept</span>
        <label class="toggle">
          <input type="checkbox" id="intercept-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </header>

  <div id="site-bar" class="site-bar" style="display:none">
    <span id="site-status"></span>
    <button id="site-toggle-btn"></button>
  </div>

  <div id="app-status" class="app-status"></div>

  <div class="toolbar">
    <input id="search" type="text" placeholder="Search…" autocomplete="off">
    <select id="filter-type">
      <option value="all">All types</option>
      <option value="MP4">MP4</option>
      <option value="HLS">HLS</option>
      <option value="DASH">DASH</option>
      <option value="AUDIO">Audio</option>
      <option value="PDF">PDF</option>
      <option value="ZIP">ZIP</option>
      <option value="IMAGE">Image</option>
    </select>
    <button id="btn-page" title="Send page URL to app">Page</button>
    <button id="btn-clear" title="Clear">✕</button>
  </div>

  <div id="list-wrap">
    <div id="empty">
      <p>No media detected.</p>
      <p class="hint">Play a video or visit a page with files.</p>
    </div>
    <ul id="item-list"></ul>
  </div>

  <footer>
    <span id="count">0 items</span>
    <span id="app-ping">Checking app…</span>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
