<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZH Downloader</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">
  <header>
    <img src="icons/icon48.png" alt="ZH" class="logo">
    <div class="header-text">
      <span class="title">ZH Downloader</span>
      <span class="sub">by ZH Motions</span>
    </div>
    <div class="header-actions">
      <button id="btn-page-url" title="Send page URL to app">📤 Page</button>
      <button id="btn-clear" title="Clear list">✕</button>
    </div>
  </header>

  <div id="app-status" class="app-status"></div>

  <div class="toolbar">
    <input id="search" type="text" placeholder="🔍 Filter…" autocomplete="off">
    <select id="filter-type">
      <option value="all">All types</option>
      <option value="MP4">MP4</option>
      <option value="WEBM">WEBM</option>
      <option value="HLS">HLS</option>
      <option value="DASH">DASH</option>
      <option value="AUDIO">Audio</option>
      <option value="PDF">PDF</option>
      <option value="ZIP">ZIP</option>
      <option value="IMAGE">Image</option>
      <option value="INSTALLER">Installer</option>
      <option value="DOC">Document</option>
    </select>
  </div>

  <div id="list-wrap">
    <div id="empty">
      <p>No media detected yet.</p>
      <p class="hint">Play a video or visit a page with downloadable files.</p>
    </div>
    <ul id="item-list"></ul>
  </div>

  <footer>
    <span id="count">0 items</span>
    <span id="app-ping"></span>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
